name: E2E (Playwright)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Run inside the official Playwright image: browsers + all OS deps are
    # pre-baked. This removes the entire setup-failure class we hit on the
    # bare runner (apt `--with-deps` hang, then post-download extract hang in
    # `playwright install`). Keep the tag pinned to the @playwright/test
    # version in package-lock.json (1.58.1) so the baked browser matches.
    container:
      image: mcr.microsoft.com/playwright:v1.58.1-noble
    permissions:
      contents: read
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run E2E
        run: npm run test:e2e
      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

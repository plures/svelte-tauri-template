name: E2E (Playwright)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    env:
      DEBIAN_FRONTEND: noninteractive
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
      # OS-level deps (apt) are installed separately and bounded so a stalled
      # apt mirror fails this step fast instead of silently hanging the whole
      # job until the timeout. Never use `playwright install --with-deps`: the
      # apt portion of that combined command is the historical hang source.
      - name: Install Playwright OS dependencies
        timeout-minutes: 8
        run: npx playwright install-deps chromium
      - name: Install Playwright browser (chromium)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: npx playwright install chromium
      - name: Run E2E
        run: npm run test:e2e
      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore

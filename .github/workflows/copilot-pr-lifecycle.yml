name: Copilot PR Lifecycle

on:
  pull_request:
    types: [opened, ready_for_review, synchronize, closed]
  check_suite:
    types: [completed]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  lifecycle:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.merged != true &&
      github.event.pull_request.user.login == 'Copilot'
    steps:
      - name: Mark ready for review
        if: github.event.action == 'opened' && github.event.pull_request.draft == true
        run: gh pr ready ${{ github.event.pull_request.number }} -R ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  queue-advance:
    runs-on: ubuntu-latest
    if: >-
      (github.event.action == 'closed' && github.event.pull_request.merged == true) ||
      github.event_name == 'check_suite' ||
      github.event.action == 'synchronize' ||
      github.event.action == 'opened' ||
      github.event.action == 'ready_for_review' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule'
    steps:
      - name: Notify QA repo
        if: github.event.action == 'closed' && github.event.pull_request.merged == true
        run: |
          gh api repos/plures/qa/dispatches \
            --method POST \
            --field event_type="pr-merged" \
            --field client_payload='{"repo":"${{ github.repository }}","pr":${{ github.event.pull_request.number }},"title":"${{ github.event.pull_request.title }}"}' || true
        env:
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}

      - name: Process open PRs and advance queue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COPILOT_PAT }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const botId = 'BOT_kgDOC9w8XQ';

            // Phase 1: Check open Copilot PRs — approve+merge if ready
            const openPRs = await github.rest.pulls.list({
              owner, repo, state: 'open', per_page: 10
            });
            const copilotPRs = openPRs.data.filter(p => p.user.login === 'Copilot');

            for (const pr of copilotPRs) {
              const sha = pr.head.sha;

              // Check CI
              const checks = await github.rest.checks.listForRef({
                owner, repo, ref: sha
              });
              const relevant = checks.data.check_runs.filter(c =>
                !['lifecycle', 'queue-advance', 'Copilot code review'].includes(c.name)
              );
              const allDone = relevant.length === 0 || relevant.every(c => c.status === 'completed');
              const allGreen = allDone && (relevant.length === 0 || relevant.every(c =>
                c.conclusion === 'success' || c.conclusion === 'skipped'
              ));
              const failing = relevant.filter(c => c.conclusion === 'failure');

              // Check reviews
              const reviews = await github.rest.pulls.listReviews({
                owner, repo, pull_number: pr.number
              });
              const copilotReview = reviews.data.find(r =>
                r.user.login === 'copilot-pull-request-reviewer[bot]'
              );
              const hasApproval = reviews.data.some(r => r.state === 'APPROVED');

              if (allGreen && !copilotReview) {
                // CI green but no review yet — request Copilot code review
                const reviewers = await github.rest.pulls.listRequestedReviewers({
                  owner, repo, pull_number: pr.number
                });
                const alreadyRequested = reviewers.data.users.some(u =>
                  u.login === 'copilot-pull-request-reviewer[bot]' || u.login === 'Copilot'
                );
                if (!alreadyRequested) {
                  await github.rest.pulls.requestReviewers({
                    owner, repo, pull_number: pr.number,
                    reviewers: ['copilot-pull-request-reviewer[bot]']
                  });
                  console.log(`🔍 CI green, requested Copilot review on PR #${pr.number}`);
                } else {
                  console.log(`⏳ CI green, review already requested on PR #${pr.number}`);
                }
                return;
              }

              if (allGreen && copilotReview && !hasApproval) {
                // CI green + Copilot reviewed → approve and merge
                await github.rest.pulls.createReview({
                  owner, repo, pull_number: pr.number,
                  event: 'APPROVE',
                  body: 'Auto-approved: CI green + Copilot code review complete.'
                });
                try {
                  await github.rest.pulls.merge({
                    owner, repo, pull_number: pr.number,
                    merge_method: 'squash'
                  });
                  console.log(`✅ Merged PR #${pr.number}`);
                } catch (e) {
                  console.log(`⚠️ Merge failed for #${pr.number}: ${e.message}`);
                  return;
                }
                // Continue to Phase 2 to assign next issue
              }

              if (allGreen && hasApproval) {
                // Already approved, just merge
                try {
                  await github.rest.pulls.merge({
                    owner, repo, pull_number: pr.number,
                    merge_method: 'squash'
                  });
                  console.log(`✅ Merged PR #${pr.number} (already approved)`);
                } catch (e) {
                  console.log(`⚠️ Merge failed: ${e.message}`);
                  return;
                }
                // Continue to Phase 2 to assign next issue
              }

              if (failing.length > 0) {
                // CI failing — create issue for Copilot to fix
                const failNames = failing.map(f => f.name).join(', ');
                const existing = await github.rest.issues.listForRepo({
                  owner, repo, state: 'open', labels: 'ci-failure', per_page: 20
                });
                if (!existing.data.some(i => i.title.includes(`PR #${pr.number}`))) {
                  const issue = await github.rest.issues.create({
                    owner, repo,
                    title: `[ci-feedback] Fix CI failures on PR #${pr.number}`,
                    body: `PR #${pr.number} has failing CI checks: ${failNames}\n\nPlease fix the failures and push to the PR branch.\n\n@copilot`,
                    labels: ['ci-failure', 'bug']
                  });
                  try {
                    await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                      owner, repo, issue_number: issue.data.number, type: 'Bug'
                    });
                  } catch (e) {}
                  console.log(`🐛 Created CI fix issue #${issue.data.number} for PR #${pr.number}`);
                }
              }

              // PR exists but not ready — don't assign new work
              // Track periodic checks via label (max 4, then stop)
              if (github.event_name === 'schedule') {
                const checkLabels = pr.labels.filter(l => l.name.startsWith('queue-check:'));
                const count = checkLabels.length > 0 ? parseInt(checkLabels[0].name.split(':')[1]) || 0 : 0;
                if (count >= 4) {
                  console.log(`🛑 PR #${pr.number} hit max periodic checks (4). Manual intervention needed.`);
                  return;
                }
                // Update counter label
                for (const cl of checkLabels) {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number: pr.number, name: cl.name }).catch(() => {});
                }
                await github.rest.issues.addLabels({ owner, repo, issue_number: pr.number, labels: [`queue-check:${count + 1}`] }).catch(() => {});
                console.log(`🔄 Periodic check ${count + 1}/4 on PR #${pr.number} (CI done: ${allDone}, green: ${allGreen}, reviewed: ${!!copilotReview})`);
              } else {
                console.log(`⏸️ PR #${pr.number} open but not ready (CI done: ${allDone}, green: ${allGreen}, reviewed: ${!!copilotReview})`);
              }
              return;
            }

            // Phase 2: No open PRs — assign next issue
            const allIssues = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', per_page: 100
            });
            const copilotBusy = allIssues.data.some(i =>
              !i.pull_request && i.assignees.some(a => a.login === 'Copilot')
            );
            if (copilotBusy) {
              console.log('Copilot already has an assigned issue');
              return;
            }

            const skipPrefixes = ['[cross-repo]', '[praxis-health]'];

            // Priority 1: Doc debt
            const docIssues = allIssues.data.filter(i =>
              !i.pull_request &&
              !i.assignees.some(a => a.login === 'Copilot') &&
              i.labels.some(l => l.name === 'documentation')
            );
            if (docIssues.length > 0) {
              const doc = docIssues[0];
              await ensureLabelsAndType(github, owner, repo, doc, 'Task');
              await assignCopilot(github, owner, repo, doc, botId,
                '@copilot Update docs per the diff in this issue. Verify against source code.');
              console.log(`📝 Doc debt: assigned #${doc.number}`);
              return;
            }

            // Priority 2: QA bugs + CI failures
            const bugs = allIssues.data.filter(i =>
              !i.pull_request &&
              !i.assignees.some(a => a.login === 'Copilot') &&
              i.labels.some(l => l.name === 'bug' || l.name === 'ci-failure')
            );
            if (bugs.length > 0) {
              const bug = bugs[0];
              await ensureLabelsAndType(github, owner, repo, bug, 'Bug');
              await assignCopilot(github, owner, repo, bug, botId,
                '@copilot Please fix this issue.');
              console.log(`🐛 Bug fix: assigned #${bug.number}`);
              return;
            }

            // Priority 3: Level-critical issues (below floor — treat as bugs)
            const levelCritical = allIssues.data.filter(i =>
              !i.pull_request &&
              !i.assignees.some(a => a.login === 'Copilot') &&
              i.labels.some(l => l.name === 'critical') &&
              i.labels.some(l => l.name === 'continuous-improvement')
            );
            if (levelCritical.length > 0) {
              const issue = levelCritical[0];
              await ensureLabelsAndType(github, owner, repo, issue, 'Bug');
              await assignCopilot(github, owner, repo, issue, botId,
                '@copilot This is a level-critical issue. The repo health dimension is below its minimum acceptable threshold. Please fix it.');
              console.log(`🔴 Level-critical: assigned #${issue.number}: ${issue.title}`);
              return;
            }

            // Priority 4: Level improvement issues (below target)
            const levelImprovement = allIssues.data.filter(i =>
              !i.pull_request &&
              !i.assignees.some(a => a.login === 'Copilot') &&
              i.labels.some(l => l.name === 'continuous-improvement') &&
              !i.labels.some(l => l.name === 'critical') &&
              !skipPrefixes.some(p => i.title.includes(p))
            );
            if (levelImprovement.length > 0) {
              const issue = levelImprovement[0];
              await ensureLabelsAndType(github, owner, repo, issue, 'Task');
              await assignCopilot(github, owner, repo, issue, botId,
                '@copilot This is a continuous improvement issue. Please implement the improvement described.');
              console.log(`📈 Improvement: assigned #${issue.number}: ${issue.title}`);
              return;
            }

            // Priority 5: Strategic gate issues
            const strategicGate = allIssues.data.filter(i =>
              !i.pull_request &&
              !i.assignees.some(a => a.login === 'Copilot') &&
              i.labels.some(l => l.name === 'strategic-gate') &&
              !skipPrefixes.some(p => i.title.includes(p))
            );
            if (strategicGate.length > 0) {
              const issue = strategicGate[0];
              await ensureLabelsAndType(github, owner, repo, issue, 'Task');
              await assignCopilot(github, owner, repo, issue, botId,
                '@copilot This is a strategic gate issue blocking downstream repos. Please implement the fix.');
              console.log(`🎯 Strategic: assigned #${issue.number}: ${issue.title}`);
              return;
            }

            // Priority 6: Milestoned features
            const milestones = await github.rest.issues.listMilestones({
              owner, repo, state: 'open', sort: 'title', direction: 'asc'
            });
            for (const ms of milestones.data) {
              const msIssues = await github.rest.issues.listForRepo({
                owner, repo, state: 'open', milestone: ms.number,
                sort: 'created', direction: 'asc', per_page: 20
              });
              const next = msIssues.data.find(i => {
                if (i.pull_request) return false;
                if (i.assignees.some(a => a.login === 'Copilot')) return false;
                if (skipPrefixes.some(p => i.title.includes(p))) return false;
                return true;
              });
              if (next) {
                await ensureLabelsAndType(github, owner, repo, next, 'Feature');
                await assignCopilot(github, owner, repo, next, botId,
                  '@copilot Please implement this issue.');
                console.log(`✅ Feature: assigned #${next.number}: ${next.title}`);
                return;
              }
            }

            // Phase 3: Stall detection — if Copilot assigned but no PR after 30min, re-ping
            const assigned = allIssues.data.filter(i =>
              !i.pull_request && i.assignees.some(a => a.login === 'Copilot')
            );
            for (const issue of assigned) {
              const assignedAt = new Date(issue.updated_at);
              const age = Date.now() - assignedAt.getTime();
              if (age > 30 * 60 * 1000) {
                // Check no open PR references this issue
                const hasPR = copilotPRs.some(pr => pr.body && pr.body.includes(`#${issue.number}`));
                if (!hasPR) {
                  // Ensure type is set
                  try {
                    await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                      owner, repo, issue_number: issue.number, type: 'Task'
                    });
                  } catch (e) {}
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: issue.number,
                    body: '@copilot This issue has been assigned for over 30 minutes with no PR. Please implement it.'
                  });
                  console.log(`⏰ Stall: re-pinged #${issue.number}`);
                }
              }
            }

            console.log('🎉 No eligible issues remaining');

            async function ensureLabelsAndType(github, owner, repo, issue, type) {
              if (issue.labels.length === 0) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issue.number,
                  labels: [type === 'Bug' ? 'bug' : 'enhancement']
                }).catch(() => {});
              }
              try {
                await github.request('PATCH /repos/{owner}/{repo}/issues/{issue_number}', {
                  owner, repo, issue_number: issue.number, type
                });
              } catch (e) {}
            }

            async function assignCopilot(github, owner, repo, issue, botId, comment) {
              await github.graphql(`
                mutation($id: ID!, $assignees: [ID!]!) {
                  addAssigneesToAssignable(input: { assignableId: $id, assigneeIds: $assignees }) {
                    clientMutationId
                  }
                }
              `, { id: issue.node_id, assignees: [botId] });
              await github.rest.issues.createComment({
                owner, repo, issue_number: issue.number, body: comment
              });
            }









